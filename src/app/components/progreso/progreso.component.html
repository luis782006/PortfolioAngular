<div class="container">
    <div class="row">
        <div class="col progreso-anuncio">
            <h1>Hard & Soft Skills <span><button class="agregarInfo">Agregar habilidades</button></span></h1>  
        </div>
        <div class="row progreso">
            <div *ngFor="let progreso of progresos">
                <h2>{{progreso.nombreTec}}:</h2>
                <div class="progress">
                    <div class="progress-bar" role="progressbar" [ngStyle]="{'width':progreso.progresoTec}" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">{{progreso.progresoTec}}</div>
                </div>
            </div>
        </div>
    </div>
</div>
